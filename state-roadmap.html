<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ethereum Protocol Privacy Roadmap</title>
<meta name="description" content="An 18-month roadmap of Ethereum L1 protocol privacy work — rows by dimension (trustlessness, censorship resistance, throughput, cryptography, state), quarters left to right." />

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<style type="text/tailwindcss">
  @import "tailwindcss";

  @theme {
    --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --color-ink: #0f172a;
  }

  /* Lane colors as plain custom properties. They are referenced only from inline
     styles / JS, which Tailwind does not scan, so keeping them out of @theme stops
     Tailwind v4 from tree-shaking them away. */
  :root {
    --color-laneA: #ea580c; /* curb growth    */
    --color-laneB: #2563eb; /* access pricing */
    --color-laneC: #7c3aed; /* structure      */
    --color-laneD: #0d9488; /* statelessness  */
    --color-laneE: #e11d48; /* lifecycle      */
    --color-laneF: #4f46e5; /* accounts/value */
    --color-ok:    #16a34a; /* confirmed      */
  }

  @layer components {
    .roadmap {
      display: grid;
      /* column tracks + min-width are set per-mode in JS (gridStyle) */
    }

    .scroll-x { overflow: auto; }

    .corner  { position: sticky; top: 0; left: 0; z-index: 40; background: var(--color-white); }
    .fhead   { position: sticky; top: 0; z-index: 30; background: var(--color-white); }
    .llabel  { position: sticky; left: 0; z-index: 20; background: color-mix(in oklab, var(--accent) 13%, white); box-shadow: inset 4px 0 0 0 var(--accent); }

    .row-line { border-top: 1px solid color-mix(in oklab, var(--color-slate-300) 55%, white); }
    .head-line { border-bottom: 1px solid var(--color-slate-200); }
    .fhead[data-confirmed="true"] { box-shadow: inset 0 -2px 0 0 var(--color-ok); }

    .cell { display: flex; flex-direction: column; gap: --spacing(2); padding: --spacing(2) --spacing(2); background: color-mix(in oklab, var(--accent) 6%, white); }

    /* North Star column — the aspirational "goals" column, given a distinct look */
    .fhead.ns-col, .cell.ns-col { background: color-mix(in oklab, #f59e0b 8%, white); }
    .fhead.ns-col { border-left: 2px solid color-mix(in oklab, #f59e0b 45%, white); }
    .cell.ns-col { border-left: 2px solid color-mix(in oklab, #f59e0b 30%, white); }
    .ns-star { color: #f59e0b; }
    .tile-northstar .ttl { margin-top: 0; }

    /* superseded column — set aside, neutral & minimal */
    .fork-sep { border-left: 2px solid var(--color-slate-200); }
    .fhead[data-muted="true"] { background: var(--color-slate-50); }
    .cell-sup { background: var(--color-slate-50); gap: --spacing(1); }
    .tile-mini { display: block; padding: --spacing(1.5) --spacing(2); border-radius: var(--radius-md); text-decoration: none; color: var(--color-slate-500); font-size: 12px; line-height: 1.35; }
    .tile-mini:hover { background: var(--color-slate-100); color: var(--color-slate-700); }
    .tile-mini .me { font-weight: 700; color: var(--color-slate-400); }

    /* ---- tiles: uniform height — kicker, clamped title, pipeline pinned to the bottom ---- */
    .tile {
      display: flex;
      flex-direction: column;
      height: clamp(56px, calc((100dvh - 314px) / var(--mrows, 7)), 168px);   /* uniform; --mrows = total vertical tile-slots so the board always fits */
      background: var(--color-white);
      border-radius: var(--radius-xl);
      padding: --spacing(2);
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 1px 2px rgb(2 6 23 / 0.05), 0 1px 3px rgb(2 6 23 / 0.04);
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .tile:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgb(2 6 23 / 0.12); }

    .tile-confirmed { outline: 1.5px solid color-mix(in oklab, var(--color-ok) 55%, white); outline-offset: -1.5px; }
    .chk { color: var(--color-ok); font-weight: 800; }
    .tile-headliner.tile-confirmed { outline-color: color-mix(in oklab, var(--color-ok) 70%, var(--color-ink)); }
    .tile-headliner .chk { color: #4ade80; }

    .kick { display: flex; align-items: center; gap: --spacing(1.5); font-size: 11px; font-weight: 600; color: var(--color-slate-400); white-space: nowrap; overflow: hidden; flex: none; }
    .dot  { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); flex: none; }
    .ttl  { margin-top: 2px; flex: 1 1 auto; min-height: 0; font-size: 12.5px; line-height: 1.15; font-weight: 600; color: var(--color-slate-900); letter-spacing: -0.01em;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .tile-headliner { background: var(--color-ink); }
    .tile-headliner .ttl { color: var(--color-white); }
    .tile-headliner .kick { color: color-mix(in oklab, var(--accent) 65%, white); }

    .tile-northstar { background: var(--color-white); box-shadow: none; outline: 1.5px dashed var(--accent); outline-offset: -1.5px; }
    .tile-northstar .ttl::before { content: "★ "; color: var(--accent); }
    .tile-northstar:hover { transform: none; box-shadow: none; }

    .tile-soft { background: transparent; box-shadow: none; outline: 1px dashed var(--color-slate-300); outline-offset: -1px; opacity: 0.8; }
    .tile-soft .ttl { font-size: 15px; font-weight: 500; color: var(--color-slate-500); }

    /* ---- maturity pipeline (idea → mainnet) ---- */
    .meta { display: flex; align-items: center; gap: --spacing(2); margin-top: 2px; flex: none; }   /* bar + stage label share one row at the bottom */
    .stages { display: flex; gap: 2px; }
    .meta .stages { flex: 1 1 auto; min-width: 0; }
    .seg { height: 4px; flex: 1; border-radius: 999px; background: color-mix(in oklab, var(--color-slate-300) 60%, white); }
    .seg.on { background: var(--accent); }
    .slabel { flex: none; font-size: 9px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
    .tile-headliner .seg { background: color-mix(in oklab, white 22%, transparent); }
    .tile-headliner .seg.on { background: color-mix(in oklab, var(--accent) 55%, white); }
    .tile-headliner .slabel { color: color-mix(in oklab, var(--accent) 60%, white); }

    /* ---- Hegotá milestone column ---- */
    .fhead[data-milestone="true"] .when-sub { color: var(--accent-ink, var(--color-slate-900)); font-weight: 700; }
    .fhead[data-milestone="true"] { box-shadow: inset 0 -2px 0 0 var(--color-ink); }

    /* ---- dependency arrows ---- */
    .roadmap { position: relative; }
    #depsvg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 5; }
    #depsvg path { pointer-events: none; }
    #depsvg path.dep { fill: none; stroke: #94a3b8; stroke-width: 1.5; opacity: 0.6; }
    #depsvg path.dep-hit { fill: none; stroke: transparent; stroke-width: 14px; }
    body.editing #depsvg path.dep-hit { pointer-events: stroke; cursor: pointer; }
    body.editing #depsvg path.dep-hit:hover + path.dep { stroke: #e11d48; opacity: 1; }
    .tile[data-itemid] { position: relative; }
    .etile { position: relative; }
    body.editing .linkbtn { position: absolute; top: 6px; right: 6px; z-index: 6; border: 1px solid var(--color-slate-200); background: var(--color-white); color: var(--color-slate-500); border-radius: 999px; width: 22px; height: 22px; font-size: 12px; line-height: 1; cursor: pointer; padding: 0; }
    body.editing .linkbtn:hover { background: var(--color-slate-50); color: var(--color-slate-800); }
    body.editing .etile.link-src { outline: 2px solid #6366f1; outline-offset: 1px; }
    body.editing.linking .etile { cursor: crosshair; }

    /* ---- timeline view ---- */
    .tl-era { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--color-slate-400); border-bottom: 2px solid var(--color-slate-300); padding-bottom: 2px; display: flex; align-items: flex-end; overflow: hidden; white-space: nowrap; }
    .tl-era-ms { color: var(--color-slate-900); border-bottom-color: var(--color-ink); }
    .tl-q { font-size: 11px; font-weight: 600; color: var(--color-slate-600); display: flex; align-items: center; white-space: nowrap; }
    .tl-group { font-size: 11px; font-weight: 700; display: flex; align-items: center; padding-left: 8px; border-left: 3px solid var(--accent); background: color-mix(in oklab, var(--accent) 8%, transparent); border-radius: 4px; }
    .tl-label { font-size: 11px; display: flex; align-items: center; gap: 4px; overflow: hidden; padding-right: 6px; min-width: 0; }
    .tl-label a, .tl-label > span { display: flex; align-items: center; gap: 4px; overflow: hidden; text-decoration: none; color: inherit; min-width: 0; }
    .tl-eip { font-size: 9px; font-weight: 700; color: var(--color-slate-400); flex: none; }
    .tl-title { font-weight: 600; color: var(--color-slate-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-chip { border-radius: 3px; font-size: 8.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; letter-spacing: .02em; }
    body.editing .tl-chip { cursor: pointer; }
    .tl-cell { border-radius: 3px; outline: 1px dashed transparent; cursor: pointer; }
    body.editing .tl-cell { outline-color: color-mix(in oklab, var(--color-slate-300) 70%, transparent); }
    body.editing .tl-cell:hover, body.editing .tl-chip:hover { outline: 1.5px solid var(--color-slate-400); }
    .tl-link, .tl-del { flex: none; border: none; background: none; cursor: pointer; font-size: 11px; line-height: 1; padding: 0 2px; border-radius: 4px; color: var(--color-slate-400); }
    .tl-link:hover { color: #4f46e5; background: color-mix(in oklab, #4f46e5 12%, white); }
    .tl-del:hover { color: #e11d48; background: color-mix(in oklab, #e11d48 12%, white); }
    .tl-tin { font: inherit; font-size: 11px; font-weight: 600; border: 1px solid var(--color-slate-200); border-radius: 4px; padding: 1px 5px; min-width: 0; flex: 1; background: var(--color-white); color: var(--color-slate-900); }
    .tl-tin:focus { outline: 2px solid color-mix(in oklab, #6366f1 45%, white); border-color: transparent; }
    .tl-add { font-size: 10.5px; font-weight: 600; color: var(--color-slate-500); background: none; border: 1px dashed var(--color-slate-300); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .tl-add:hover { background: var(--color-slate-50); color: var(--color-slate-700); }
    .tl-label.link-src { outline: 2px solid #6366f1; outline-offset: 1px; border-radius: 4px; }
    /* milestone bars (read view) */
    .tl-bar { height: 24px; align-self: center; border-radius: 999px; position: relative; z-index: 1; box-shadow: 0 1px 2px rgba(2,6,23,.10), inset 0 1px 0 rgba(255,255,255,.28); }
    .tl-gate { align-self: center; justify-self: center; z-index: 2; font-size: 9px; font-weight: 700; border-radius: 999px; padding: 2px 7px; white-space: nowrap; box-shadow: 0 1px 2px rgba(2,6,23,.14); }
    .tl-group, .tl-label { position: relative; z-index: 1; }
    .tl-group { letter-spacing: .01em; }
    /* a box spanning a lane's rows at one quarter (e.g. the leanVM convergence) */
    .tl-span { position: relative; z-index: 3; align-self: stretch; justify-self: stretch; margin: 3px 2px; border-radius: 12px; color: #fff; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4px; box-shadow: 0 2px 8px rgba(2,6,23,.18), inset 0 1px 0 rgba(255,255,255,.25); }
    .tl-span span { font-size: 11px; font-weight: 700; line-height: 1.18; }

    /* ---- open-question badge + edit pencil on boxes ---- */
    .oqbadge { position: absolute; top: 5px; right: 6px; z-index: 6; width: 16px; height: 16px; border-radius: 999px; background: #f59e0b; color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 1px 2px rgba(2,6,23,.25); }
    .tile-headliner .oqbadge { box-shadow: 0 0 0 1.5px var(--color-ink); }
    .editpen { position: absolute; top: 5px; right: 6px; z-index: 7; width: 18px; height: 18px; border-radius: 6px; border: none; background: rgba(255,255,255,.92); color: var(--color-slate-500); font-size: 11px; line-height: 1; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(2,6,23,.18); }
    .tile:hover .editpen, .tl-span:hover .editpen { display: flex; }
    .tile:hover .oqbadge:not(.oqbadge-inline), .tl-span:hover .oqbadge:not(.oqbadge-inline) { right: 28px; }   /* slide badge aside so the pencil has room */
    /* inline variants used in the timeline's effort label (col 1) */
    .editpen-inline { position: static; display: none; flex: none; }
    .tl-label:hover .editpen-inline { display: inline-flex; }
    .oqbadge-inline { position: static; flex: none; width: 15px; height: 15px; }

    /* ---- hover card ---- */
    #hovercard { position: fixed; z-index: 80; max-width: 320px; background: var(--color-white); border: 1px solid var(--color-slate-200); border-radius: 12px; box-shadow: 0 12px 32px rgba(2,6,23,.18); padding: 12px 13px; pointer-events: none; }
    #hovercard.hidden { display: none; }
    .hc-title { font-size: 13px; font-weight: 700; color: var(--color-slate-900); }
    .hc-eip { font-size: 10px; font-weight: 700; color: var(--color-slate-400); }
    .hc-sum { margin-top: 5px; font-size: 12px; line-height: 1.45; color: var(--color-slate-600); }
    .hc-oq { margin-top: 9px; border-top: 1px solid var(--color-slate-100); padding-top: 8px; }
    .hc-oq-h { font-size: 9.5px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; color: #b45309; margin-bottom: 4px; }
    .hc-q { font-size: 11.5px; line-height: 1.4; color: var(--color-slate-700); padding-left: 12px; position: relative; margin-top: 3px; }
    .hc-q::before { content: "?"; position: absolute; left: 0; color: #f59e0b; font-weight: 800; }

    /* ---- details editor modal ---- */
    #detailsModal { position: fixed; inset: 0; z-index: 90; background: rgba(15,23,42,.4); display: flex; align-items: center; justify-content: center; padding: 16px; }
    #detailsModal.hidden { display: none; }
    .dm-box { width: min(460px, 100%); background: var(--color-white); border-radius: 16px; box-shadow: 0 20px 50px rgba(2,6,23,.35); padding: 18px; max-height: 86dvh; overflow: auto; }
    .dm-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 15px; }
    .dm-x { border: none; background: none; cursor: pointer; font-size: 15px; color: var(--color-slate-400); }
    .dm-l { display: block; font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--color-slate-500); margin: 12px 0 4px; }
    .dm-sum { width: 100%; font: inherit; font-size: 13px; border: 1px solid var(--color-slate-200); border-radius: 8px; padding: 8px; resize: vertical; }
    .dm-qrow { display: flex; gap: 6px; margin-top: 6px; }
    .dm-q { flex: 1; font: inherit; font-size: 13px; border: 1px solid var(--color-slate-200); border-radius: 8px; padding: 6px 8px; }
    .dm-qx { border: none; background: none; color: #e11d48; cursor: pointer; font-size: 13px; }
    .dm-add { margin-top: 8px; font-size: 12px; font-weight: 600; color: #b45309; background: none; border: 1px dashed #fcd34d; border-radius: 8px; padding: 6px 10px; cursor: pointer; }
    .dm-foot { margin-top: 16px; display: flex; justify-content: flex-end; }
    .dm-save { background: var(--color-ink); color: #fff; border: none; border-radius: 9px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }

    /* ---- edit mode ---- */
    body.editing footer { display: none; }
    body.editing .cell { min-height: 72px; gap: --spacing(2.5); }
    .etile { background: var(--color-white); border-radius: var(--radius-xl); padding: --spacing(2.5); box-shadow: 0 1px 2px rgb(2 6 23 / 0.06); display: flex; flex-direction: column; gap: --spacing(1.5); }
    .etile .erow { display: flex; align-items: center; gap: --spacing(1.5); }
    .grip { cursor: grab; color: var(--color-slate-400); font-size: 13px; line-height: 1; user-select: none; padding: 0 2px; }
    .grip:active { cursor: grabbing; }
    .etile input, .etile select { font: inherit; font-size: 12.5px; border: 1px solid var(--color-slate-200); border-radius: var(--radius-md); padding: 2px 6px; background: var(--color-white); color: var(--color-slate-900); min-width: 0; }
    .etile input:focus, .etile select:focus { outline: 2px solid color-mix(in oklab, var(--accent) 45%, white); border-color: transparent; }
    .etile .eid { width: 72px; flex: none; font-weight: 600; }
    .etile .kindsel { flex: 1; min-width: 0; }
    .etile .ein { width: 100%; }
    .etile .del { margin-left: auto; flex: none; border: none; background: none; color: #e11d48; cursor: pointer; font-size: 13px; padding: 2px 5px; border-radius: 6px; }
    .etile .del:hover { background: color-mix(in oklab, #e11d48 12%, white); }
    .addtile { width: 100%; border: 1.5px dashed color-mix(in oklab, var(--accent) 35%, var(--color-slate-300)); color: color-mix(in oklab, var(--accent) 62%, var(--color-slate-600)); background: none; border-radius: var(--radius-lg); padding: --spacing(2); font-size: 12px; font-weight: 600; cursor: pointer; }
    .addtile:hover { background: color-mix(in oklab, var(--accent) 9%, white); }
    .ghost { opacity: 0.4; }
    .ebtn { font-size: 13px; font-weight: 600; padding: --spacing(1.5) --spacing(3); border-radius: var(--radius-lg); border: 1px solid var(--color-slate-200); background: var(--color-white); color: var(--color-slate-700); cursor: pointer; }
    .ebtn:hover { background: var(--color-slate-50); }
    .ebtn-primary { background: var(--color-ink); border-color: var(--color-ink); color: var(--color-white); }
    .ebtn-primary:hover { background: #1e293b; }
  }
</style>
</head>

<body class="min-h-dvh bg-slate-50 font-sans text-slate-900 antialiased">

  <header class="mx-auto max-w-[1580px] px-6 pt-5 pb-3">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <h1 class="text-3xl/10 font-semibold tracking-tight sm:text-4xl">Ethereum Protocol Privacy Roadmap</h1>
      <div class="flex items-center gap-2">
        <span id="status" class="mr-1 hidden text-sm/6 text-slate-400"></span>
        <span id="editTools" class="hidden items-center gap-2">
          <button id="saveBtn" class="ebtn ebtn-primary" title="Write roadmap-data.js on disk (needs the dev server)">Save to file</button>
          <button id="downloadBtn" class="ebtn">Download</button>
          <button id="copyBtn" class="ebtn">Copy JSON</button>
          <button id="resetBtn" class="ebtn">Reset</button>
        </span>
        <button id="viewToggle" class="ebtn">Matrix view</button>
        <button id="editToggle" class="ebtn ebtn-primary">Edit</button>
      </div>
    </div>
    <p id="draftNote" class="mt-3 hidden text-sm/6 text-slate-500">
      You have a saved edit draft — click <span class="font-semibold">Edit</span> to resume · <button id="resetLink" class="font-medium text-emerald-700 underline underline-offset-2 hover:text-emerald-900">discard it</button>
    </p>
    <p id="editHint" class="mt-3 hidden text-sm/6 text-slate-500">
      Click a quarter cell to set/advance its stage · <span class="font-semibold">↳</span> then another effort’s name draws a dependency · click an arrow to remove it · <span class="font-semibold">+ add effort</span> per lane · <span class="font-semibold">Save to file</span> writes <code class="rounded bg-slate-100 px-1">roadmap-data.js</code>.
    </p>
  </header>

  <main class="mx-auto max-w-[1580px] px-3 pb-4 sm:px-6">
    <div class="scroll-x rounded-2xl">
      <div id="roadmap" class="roadmap"></div>
    </div>

    <footer id="legend" class="flex flex-wrap items-center gap-x-4 gap-y-1 px-3 pt-3 text-xs/5 text-slate-400"></footer>
  </main>

<script src="roadmap-data.js"></script>
<script>
/* roadmap-data.js (window.ROADMAP) is the published source of truth.
   The page is read-only until you click "Edit". Edits autosave to this browser
   and can be downloaded as a new roadmap-data.js. */
const LS = "stateRoadmapLayout.v1";
const LS_BASE = LS + ".base";
const fp = arr => JSON.stringify((arr||[]).map(({ _uid, ...r }) => r));
const FILE_FP = fp(window.ROADMAP.ITEMS);   // fingerprint of the published file this page loaded
const { E, M, FORKS, LANES } = window.ROADMAP;

const KIND  = { headliner:"tile-headliner", northstar:"tile-northstar", soft:"tile-soft" };
const KINDS = [ ["","Draft"], ["headliner","Headliner"], ["northstar","North star"], ["soft","Research"] ];
const STAGES = [ ["research","Research"], ["eip","EIP"], ["prototype","Prototype"], ["devnet","Devnet"], ["pfi","PFI"], ["cfi","CFI"], ["sfi","SFI"], ["mainnet","Mainnet"] ];
const STAGE_LABEL = Object.fromEntries(STAGES.map(([v,l]) => [v,l]));
const SIDX = Object.fromEntries(STAGES.map(([v],i) => [v,i]));
const CONFIRMED = new Set(FORKS.filter(f => f.confirmed).map(f => f.id));
const VFORKS = FORKS.filter(f => f.id !== "superseded");        // view mode hides the archive column
const LNAME = Object.fromEntries(LANES.map(l => [l.id, l.name]));
const LIDX  = Object.fromEntries(LANES.map((l,i) => [l.id, i]));
const FIDX  = Object.fromEntries(FORKS.map((f,i) => [f.id, i]));
const FNAME = Object.fromEntries(FORKS.map(f => [f.id, f.name]));

/* view state: timeline (primary) | matrix (derived snapshot) */
const LV = "roadmapView";
let VIEW = (() => { try { return localStorage.getItem(LV) === "matrix" ? "matrix" : "timeline"; } catch { return "timeline"; } })();

/* stage chip colors [bg, fg] + short labels, for the timeline */
const STAGE_C = {
  research:["#e2e8f0","#475569"], eip:["#ddd6fe","#5b21b6"], prototype:["#bfdbfe","#1e40af"],
  devnet:["#bae6fd","#075985"], pfi:["#fde68a","#92400e"], cfi:["#fed7aa","#9a3412"],
  sfi:["#bbf7d0","#166534"], mainnet:["#86efac","#14532d"]
};
const STAGE_SHORT = { research:"RES", eip:"EIP", prototype:"PROTO", devnet:"DEV", pfi:"PFI", cfi:"CFI", sfi:"SFI", mainnet:"LIVE" };
const CYCLE = [null,"research","eip","prototype","devnet","pfi","cfi","sfi","mainnet"];

/* derive the matrix's single (fork, stage) for an item from its per-quarter track */
function furthestStage(it){ const t = it.track||{}; let best=null, bi=-1; for (const k in t){ const i=SIDX[t[k]]; if (i>bi){ bi=i; best=t[k]; } } return best; }
function targetFork(it){ const t = it.track||{}; const best = furthestStage(it); if (best==null) return null; let res=null; for (const f of FORKS){ if (t[f.id]===best) res=f.id; } return res; }

const $ = s => document.querySelector(s);
const grid = $("#roadmap"), statusEl = $("#status"), draftNote = $("#draftNote"), editHint = $("#editHint");

const isEip = id => /^\d+$/.test(id);
const esc = s => String(s==null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

let uidc = 1;
const withUid = items => items.map(it => ({ ...it, _uid: uidc++ }));
const clean = () => WORKING.map(({ _uid, ...r }) => r);
function readDraft(){ try {
  const base = localStorage.getItem(LS_BASE);
  if (base !== FILE_FP) { localStorage.removeItem(LS); localStorage.removeItem(LS_BASE); return null; }  // draft was forked from a different file → it's stale
  const r = localStorage.getItem(LS); const a = r && JSON.parse(r);
  return (Array.isArray(a) && a.length) ? a : null;
} catch { return null; } }
function save(){ try { localStorage.setItem(LS, JSON.stringify(clean())); localStorage.setItem(LS_BASE, FILE_FP); } catch {} if (editing) flash("local draft saved ✓", true); }

let WORKING = withUid(window.ROADMAP.ITEMS);   // view = the committed roadmap-data.js; the local draft is loaded only in Edit mode
let editing = false;
let sortables = [];

/* ---------- matrix tile (derived snapshot; read-only) ---------- */
function tileView(it){
  const ns = it.kind === "northstar";
  const label = isEip(it.id) ? `EIP-${it.id}` : it.id;
  const kick = ns ? "" : `<div class="kick">${esc(label)}</div>`;
  const cls = `tile arrowanchor ${KIND[it.kind]||""}`;
  const si = SIDX[it.stage];
  const bar = si == null ? "" :
    `<div class="meta"><div class="stages">${STAGES.map((_,i) => `<span class="seg${i<=si ? " on" : ""}"></span>`).join("")}</div><span class="slabel">${esc(STAGE_LABEL[it.stage])}</span></div>`;
  const badge = (Array.isArray(it.oq) && it.oq.length) ? `<span class="oqbadge" data-edit="${esc(it.id)}" title="open questions">?</span>` : "";
  const pen = `<button class="editpen" data-edit="${esc(it.id)}" title="edit description & open questions">✎</button>`;
  const inner = `${pen}${badge}${kick}<div class="ttl">${esc(it.title)}</div>${bar}`;
  return it.link
    ? `<a class="${cls}" data-itemid="${esc(it.id)}" href="${esc(it.link)}" target="_blank" rel="noreferrer">${inner}</a>`
    : `<div class="${cls}" data-itemid="${esc(it.id)}">${inner}</div>`;
}

/* ---------- timeline label (col 1 of each effort row) ---------- */
function labelHTML(it){
  const eip = isEip(it.id) ? `<span class="tl-eip">EIP-${esc(it.id)}</span>` : "";
  const badge = (Array.isArray(it.oq) && it.oq.length) ? `<span class="oqbadge oqbadge-inline" data-edit="${esc(it.id)}" title="open questions">?</span>` : "";

function buildMatrix(){
  grid.style.gap = ""; grid.style.gridAutoRows = ""; grid.style.height = ""; grid.style.gridTemplateRows = "";
  // columns = fork eras (Glamsterdam / Hegotá / I*), so tiles are wide and readable
  const eras = [];
  for (const f of FORKS){ const w = f.when || "—"; if (!eras.length || eras[eras.length-1].when !== w) eras.push({ when:w, milestone:!!f.milestone, forks:[f.id] }); else eras[eras.length-1].forks.push(f.id); }
  const eraOf = {}; eras.forEach((e,i) => e.forks.forEach(fid => eraOf[fid] = i));
  grid.style.gridTemplateColumns = "minmax(150px,200px) " + eras.map(() => "minmax(0,1fr)").join(" ");
  grid.style.minWidth = "0";
  const proj = WORKING.map(it => ({ ...it, fork: targetFork(it), stage: furthestStage(it) }));
  // adaptive height: tallest stack across cells, summed per lane → tile clamp divides by this
  let slots = 0;
  for (const lane of LANES){ let m = 1; eras.forEach((e,i) => { const n = proj.filter(it => it.lane===lane.id && eraOf[it.fork]===i).length; if (n > m) m = n; }); slots += m; }
  grid.style.setProperty("--mrows", slots);
  const out = [`<div class="corner head-line"></div>`];
  eras.forEach(e => {
    const range = e.forks.length > 1 ? `${FNAME[e.forks[0]]} – ${FNAME[e.forks[e.forks.length-1]]}` : FNAME[e.forks[0]];
    out.push(`<div class="fhead head-line px-3 py-2" data-milestone="${e.milestone}">
        <div class="text-slate-900 text-base/5 font-semibold tracking-tight">${esc(e.when)}</div>
        <div class="when-sub text-[10px]/4 text-slate-400">${esc(range)}</div>
      </div>`);
  });
  for (const lane of LANES){
    out.push(`<div class="llabel row-line px-4 py-4" style="--accent:${lane.color}">
        <div class="flex items-center gap-2"><span class="dot"></span><span class="text-[15px]/5 font-semibold" style="color:${lane.color}">${lane.name}</span></div>
      </div>`);
    eras.forEach((e,i) => {
      const items = proj.filter(it => it.lane===lane.id && eraOf[it.fork]===i);
      out.push(`<div class="cell row-line" data-lane="${lane.id}" style="--accent:${lane.color}">${items.map(tileView).join("")}</div>`);
    });
  }
  grid.innerHTML = out.join("");
}

/* milestone-bar (read) timeline */
const LANE_RGB = { trust:"13,148,136", cr:"234,88,12", tput:"37,99,235", crypto:"124,58,237", state:"79,70,229" };
const GATE = { eip:["EIP",null], prototype:["proto",null], devnet:["devnet",null], pfi:["★ PFI","#d97706"], cfi:["★ CFI","#ea580c"], sfi:["★ SFI","#16a34a"], mainnet:["★ LIVE","#15803d"] };
function gatePill(stage, rgb, row, col){
  const g = GATE[stage]; if (!g) return "";
  const style = g[1] ? `background:${g[1]};color:#fff;` : `background:var(--color-white);border:1px solid rgb(${rgb});color:rgb(${rgb});`;
  return `<div class="tl-gate" style="grid-row:${row};grid-column:${col};${style}">${g[0]}</div>`;
}
function lineDiv(n, r1, r2, kind){   // vertical line at the left edge of quarter-column n (1-based among quarters)
  const col = n + 2;
  if (kind === "today"){
    return `<div style="grid-row:${r1}/${r2+1};grid-column:${col};border-left:2px dashed #ef4444;position:relative;pointer-events:none;z-index:4;"><span style="position:absolute;top:3px;left:-17px;background:#ef4444;color:#fff;font-size:7.5px;font-weight:800;letter-spacing:.05em;padding:1px 5px;border-radius:999px;white-space:nowrap;box-shadow:0 1px 2px rgba(2,6,23,.2);">TODAY</span></div>`;
  }
  return `<div style="grid-row:${r1}/${r2+1};grid-column:${col};border-left:1px solid rgba(15,23,42,.08);pointer-events:none;z-index:0;"></div>`;
}
function buildTimelineRead(){
  const cols = FORKS.length;
  grid.style.gridTemplateColumns = "minmax(150px,180px) repeat(" + cols + ", minmax(0,1fr))";
  grid.style.minWidth = "0"; grid.style.gridAutoRows = ""; grid.style.gap = "4px";
  const rowType = [null, "head", "head"];
  const out = [`<div style="grid-row:1;grid-column:1"></div>`];
  let i = 0;
  while (i < cols){ let j = i; while (j+1 < cols && (FORKS[j+1].when||"") === (FORKS[i].when||"")) j++; if (FORKS[i].when) out.push(`<div class="tl-era ${FORKS[i].milestone?"tl-era-ms":""}" style="grid-row:1;grid-column:${i+2}/${j+3}">${esc(FORKS[i].when)}</div>`); i = j+1; }
  out.push(`<div style="grid-row:2;grid-column:1"></div>`);
  FORKS.forEach((f,ci) => out.push(`<div class="tl-q" style="grid-row:2;grid-column:${ci+2}">${esc(f.name)}</div>`));
  let row = 3; const firstRow = 3;
  for (const lane of LANES){
    out.push(`<div class="tl-group" style="grid-row:${row};grid-column:1/${cols+2};--accent:${lane.color};color:${lane.color}">${esc(lane.name)}</div>`);
    rowType[row] = "group"; row++;
    const rgb = LANE_RGB[lane.id] || "100,116,139";
    const laneItems = WORKING.filter(x => x.lane === lane.id);
    const laneTop = row;
    for (const it of laneItems){
      if (it.laneSpan) continue;   // drawn below as a box spanning this lane's rows
      const fks = FORKS.filter(f => it.track && it.track[f.id]).map(f => f.id);
      out.push(`<div class="tl-label" style="grid-row:${row};grid-column:1" data-itemid="${esc(it.id)}">${labelHTML(it)}</div>`);
      if (fks.length){
        const startC = FIDX[fks[0]] + 2, endC = FIDX[fks[fks.length-1]] + 3;
        const preEip = SIDX[furthestStage(it)] < SIDX["eip"];
        const grad = preEip
          ? `background:linear-gradient(90deg, rgba(${rgb},.13), rgba(${rgb},.42)); border:1px dashed rgba(${rgb},.55);`
          : `background:linear-gradient(90deg, rgba(${rgb},.20), rgba(${rgb},.85));`;
        out.push(`<div class="tl-bar arrowanchor" data-itemid="${esc(it.id)}" style="grid-row:${row};grid-column:${startC}/${endC};${grad}">${(Array.isArray(it.oq)&&it.oq.length)?`<span class="oqbadge" data-edit="${esc(it.id)}" title="open questions">?</span>`:""}</div>`);
        let prev = null;   // label each stage transition (EIP, devnet, PFI/CFI/SFI, mainnet); a run of the same stage shows one pill
        for (const fid of fks){ const st = it.track[fid]; if (st !== prev && st !== "research") out.push(gatePill(st, rgb, row, FIDX[fid] + 2)); prev = st; }
      }
      rowType[row] = "item"; row++;
    }
    const laneBot = row - 1;
    for (const sp of laneItems){   // laneSpan items: one box spanning the lane's rows at its quarter
      if (!sp.laneSpan || laneBot < laneTop) continue;
      const fid = Object.keys(sp.track || {})[0];
      if (fid == null || FIDX[fid] == null) continue;
      const spBadge = (Array.isArray(sp.oq) && sp.oq.length) ? `<span class="oqbadge" data-edit="${esc(sp.id)}" title="open questions">?</span>` : "";
      out.push(`<div class="tl-span arrowanchor" data-itemid="${esc(sp.id)}" style="grid-row:${laneTop}/${laneBot+1};grid-column:${FIDX[fid]+2};background:rgb(${rgb});"><button class="editpen" data-edit="${esc(sp.id)}" title="edit description & open questions">✎</button>${spBadge}<span>${esc(sp.title)}</span></div>`);
    }
  }
  const lastRow = row - 1;
  const todayN = (FIDX["q2-26"] != null ? FIDX["q2-26"] : 0) + 1;   // today ≈ end of Q2 2026
  if (todayN >= 1) out.push(`<div style="grid-row:${firstRow}/${lastRow+1};grid-column:2/${todayN+2};background:rgba(15,23,42,.04);pointer-events:none;z-index:0;"></div>`);
  const msCols = FORKS.map((f,ci) => f.milestone ? ci : -1).filter(x => x >= 0);
  if (msCols.length) out.push(`<div style="grid-row:${firstRow}/${lastRow+1};grid-column:${msCols[0]+2}/${msCols[msCols.length-1]+3};background:rgba(15,23,42,.025);pointer-events:none;z-index:0;"></div>`);
  out.push(lineDiv(todayN, firstRow, lastRow, "today"));
  for (let k = 1; k < cols; k++){ if ((FORKS[k].when||"") !== (FORKS[k-1].when||"")) out.push(lineDiv(k, firstRow, lastRow, "era")); }
  grid.style.gridTemplateRows = rowType.slice(1).map(t => t==="item" ? "minmax(34px,1fr)" : t==="group" ? "24px" : "auto").join(" ");
  grid.innerHTML = out.join("");
  fitTimeline();
}
function fitTimeline(){
  const footer = document.querySelector("footer");
  const top = grid.getBoundingClientRect().top + window.scrollY;
  const fh = footer ? footer.getBoundingClientRect().height : 0;
  grid.style.height = Math.max(340, window.innerHeight - top - fh - 24) + "px";

function buildTimeline(){ if (editing) buildTimelineEdit(); else buildTimelineRead(); }
function buildTimelineEdit(){
  const cols = FORKS.length;
  grid.style.gridTemplateColumns = "minmax(150px,180px) repeat(" + cols + ", minmax(0,1fr))";
  grid.style.minWidth = "0";

  let i = 0;
  while (i < cols){
    let j = i; while (j+1 < cols && (FORKS[j+1].when||"") === (FORKS[i].when||"")) j++;
    if (FORKS[i].when) out.push(`<div class="tl-era ${FORKS[i].milestone?"tl-era-ms":""}" style="grid-row:1;grid-column:${i+2}/${j+3}">${esc(FORKS[i].when)}</div>`);

  }
  out.push(`<div style="grid-row:2;grid-column:1"></div>`);
  FORKS.forEach((f,ci) => out.push(`<div class="tl-q" style="grid-row:2;grid-column:${ci+2}">${esc(f.name)}</div>`));
  let row = 3;
  for (const lane of LANES){
    out.push(`<div class="tl-group" style="grid-row:${row};grid-column:1/${cols+2};--accent:${lane.color};color:${lane.color}">${esc(lane.name)}</div>`);
    rowType[row] = "group"; row++;
    for (const it of WORKING.filter(x => x.lane === lane.id)){
      out.push(`<div class="tl-label" style="grid-row:${row};grid-column:1" data-itemid="${esc(it.id)}">${labelHTML(it)}</div>`);
      FORKS.forEach((f,ci) => {

    if (editing){ out.push(`<div class="tl-add" data-lane="${lane.id}" style="grid-row:${row};grid-column:1/4">+ add effort</div>`); rowType[row] = "add"; row++; }
  }
  // header/group rows stay compact; effort rows share the remaining height so the board fills the page
  grid.style.gridTemplateRows = rowType.slice(1).map(t => t==="item" ? "minmax(34px,1fr)" : t==="group" ? "26px" : t==="add" ? "26px" : "auto").join(" ");
  grid.innerHTML = out.join("");

}

/* ---------- dependency arrows ---------- */
const SVGNS = "http://www.w3.org/2000/svg";
const ctr = r => ({ x: r.x + r.w/2, y: r.y + r.h/2 });
function edgePoint(r, t){            // point on r's border in the direction of t
  const c = ctr(r), dx = t.x - c.x, dy = t.y - c.y;
  if (!dx && !dy) return c;
  const s = Math.min(dx ? (r.w/2)/Math.abs(dx) : Infinity, dy ? (r.h/2)/Math.abs(dy) : Infinity);
  return { x: c.x + dx*s, y: c.y + dy*s };
}
function drawDeps(){
  if (!grid) return;
  const old = grid.querySelector("#depsvg"); if (old) old.remove();
  const gr = grid.getBoundingClientRect();
  const groups = {};
  grid.querySelectorAll(".arrowanchor[data-itemid]").forEach(el => { (groups[el.getAttribute("data-itemid")] ||= []).push(el); });
  const rectOf = id => {
    let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
    for (const el of groups[id]){ const r = el.getBoundingClientRect(); x0=Math.min(x0,r.left); y0=Math.min(y0,r.top); x1=Math.max(x1,r.right); y1=Math.max(y1,r.bottom); }
    return { x:x0-gr.left, y:y0-gr.top, w:x1-x0, h:y1-y0 };
  };
  const rects = {}; for (const id in groups) rects[id] = rectOf(id);
  const edges = [];
  for (const it of WORKING){ if (!Array.isArray(it.deps) || !rects[it.id]) continue; for (const dep of it.deps){ if (dep !== it.id && rects[dep]) edges.push([dep, it.id]); } }
  if (!edges.length) return;
  const paths = edges.map(([from, to]) => {
    const fr = rects[from], tr = rects[to];
    const p1 = edgePoint(fr, ctr(tr)), p2 = edgePoint(tr, ctr(fr));
    const dx = p2.x-p1.x, dy = p2.y-p1.y, len = Math.hypot(dx, dy) || 1, off = Math.min(28, len*0.14);
    const cx = (p1.x+p2.x)/2 - dy/len*off, cy = (p1.y+p2.y)/2 + dx/len*off;
    const d = `M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
    return `<path class="dep-hit" data-from="${esc(from)}" data-to="${esc(to)}" d="${d}"/><path class="dep" marker-end="url(#ah)" d="${d}"/>`;
  }).join("");
  const svg = document.createElementNS(SVGNS, "svg");
  svg.id = "depsvg";
  svg.setAttribute("width", grid.scrollWidth);
  svg.setAttribute("height", grid.scrollHeight);
  svg.innerHTML = `<defs><marker id="ah" markerWidth="7" markerHeight="7" refX="5.5" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 z" fill="#94a3b8"/></marker></defs>${paths}`;
  grid.appendChild(svg);
}
function redraw(){ if (VIEW === "timeline") fitTimeline(); drawDeps(); }

function addDep(dependentId, prereqId){
  if (!dependentId || dependentId === prereqId) return;
  const it = WORKING.find(i => i.id === dependentId); if (!it) return;
  it.deps = it.deps || [];
  if (!it.deps.includes(prereqId)) it.deps.push(prereqId);
  save(); build(); flash("arrow added ✓");
}
function removeDep(dependentId, prereqId){
  const it = WORKING.find(i => i.id === dependentId); if (!it || !it.deps) return;
  it.deps = it.deps.filter(d => d !== prereqId);
  if (!it.deps.length) delete it.deps;
  save(); build(); flash("arrow removed");
}

function cycleCell(itemid, fork){
  const it = WORKING.find(i => i.id === itemid); if (!it) return;
  it.track = it.track || {};
  const next = CYCLE[(CYCLE.indexOf(it.track[fork] || null) + 1) % CYCLE.length];
  if (next) it.track[fork] = next; else delete it.track[fork];
  save(); build();
}

}
grid.addEventListener("input", e => {
  const el = e.target.closest("input[data-f]"); if (!el) return;
  const it = WORKING.find(i => String(i._uid) === el.dataset.uid); if (!it) return;
  it[el.dataset.f] = el.value; save();      // live title edit; no rebuild so focus is kept
});
grid.addEventListener("click", e => {
  if (!editing || VIEW !== "timeline") return;
  const hit = e.target.closest("path.dep-hit");
  if (hit){ removeDep(hit.dataset.to, hit.dataset.from); return; }
  const lb = e.target.closest(".tl-link");
  if (lb){ e.preventDefault(); const id = lb.dataset.link;
    if (!linkFrom) startLink(id); else if (id === linkFrom) cancelLink(); else { addDep(id, linkFrom); cancelLink(); }
    return; }
  if (linkFrom){
    const lab = e.target.closest(".tl-label");
    if (lab && lab.dataset.itemid && lab.dataset.itemid !== linkFrom){ addDep(lab.dataset.itemid, linkFrom); cancelLink(); return; }
  }
  const del = e.target.closest(".tl-del");
  if (del){ WORKING = WORKING.filter(i => String(i._uid) !== del.dataset.uid); save(); build(); return; }
  const add = e.target.closest(".tl-add");
  if (add){ addItem(add.dataset.lane); return; }
  const cell = e.target.closest(".tl-chip, .tl-cell");
  if (cell && cell.dataset.fork){ cycleCell(cell.dataset.itemid, cell.dataset.fork); return; }
});

/* ---------- toolbar ---------- */
function setMode(on){
  editing = on;
  linkFrom = null; document.body.classList.remove("linking");
  WORKING = withUid(on ? (readDraft() || window.ROADMAP.ITEMS) : window.ROADMAP.ITEMS);
  document.body.classList.toggle("editing", on);
  $("#editToggle").textContent = on ? "Done" : "Edit";
  $("#editTools").classList.toggle("hidden", !on);
  $("#editTools").classList.toggle("flex", on);
  editHint.classList.toggle("hidden", !on);
  if (on) flash("saved ✓", true); else statusEl.classList.add("hidden");
  build(); updateNote();
}
function setView(v){
  if (v === VIEW) return;
  if (v !== "timeline" && editing) setMode(false);   // editing lives in the timeline
  VIEW = v; try { localStorage.setItem(LV, v); } catch {}
  applyViewChrome();
  build();
}
function applyViewChrome(){
  $("#viewToggle").textContent = VIEW === "timeline" ? "Matrix view" : "Timeline view";
  $("#editToggle").classList.toggle("hidden", VIEW !== "timeline");
}
function reset(){
  if (!confirm("Discard your local edits and return to the published roadmap?")) return;
  try { localStorage.removeItem(LS); localStorage.removeItem(LS_BASE); } catch {}
  WORKING = withUid(window.ROADMAP.ITEMS); build(); updateNote();
}
function updateNote(){ draftNote.classList.toggle("hidden", editing || !readDraft()); }

$("#editToggle").onclick = () => setMode(!editing);
$("#viewToggle").onclick = () => setView(VIEW === "timeline" ? "matrix" : "timeline");
document.addEventListener("keydown", e => { if (e.key === "Escape" && linkFrom) cancelLink(); });
$("#downloadBtn").onclick = () => { downloadText("roadmap-data.js", buildDataFile()); flash("downloaded ✓"); };
async function saveToFile(){
  const text = buildDataFile();
  try {
    const r = await fetch("/save", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ file:"roadmap-data.js", content:text }) });
    if (!r.ok) throw new Error(await r.text());
    try { localStorage.removeItem(LS); localStorage.removeItem(LS_BASE); } catch {}   // file is now the source of truth — drop the local draft
    flash("saved to file ✓");
    setTimeout(() => location.reload(), 250);
  } catch (e) {
    downloadText("roadmap-data.js", text);
    flash("no dev server — downloaded instead (replace the file)");
  }
}
$("#saveBtn").onclick = saveToFile;
$("#copyBtn").onclick = () => copyText(JSON.stringify(clean(), null, 2), "JSON copied ✓");
$("#resetBtn").onclick = reset;
$("#resetLink").onclick = reset;

let flashT;
function flash(msg, sticky){
  statusEl.textContent = msg; statusEl.classList.remove("hidden");
  clearTimeout(flashT);
  if (!sticky) flashT = setTimeout(() => { if (editing) statusEl.textContent = "saved ✓"; else statusEl.classList.add("hidden"); }, 1500);
}

/* ---------- export (build a fresh roadmap-data.js) ---------- */
function linkExpr(link){ if (!link) return '""'; if (link.startsWith(E)) return 'E+'+JSON.stringify(link.slice(E.length)); if (link.startsWith(M)) return 'M+'+JSON.stringify(link.slice(M.length)); return JSON.stringify(link); }
function serialize(it){ let s = `{ lane:${JSON.stringify(it.lane)}, id:${JSON.stringify(it.id)}, title:${JSON.stringify(it.title)}, link:${linkExpr(it.link)}`; if (it.kind) s += `, kind:${JSON.stringify(it.kind)}`; if (it.laneSpan) s += `, laneSpan:true`; if (it.deps && it.deps.length) s += `, deps:${JSON.stringify(it.deps)}`; if (it.track && Object.keys(it.track).length) s += `, track:${JSON.stringify(it.track)}`; if (it.oq && it.oq.length) s += `, oq:${JSON.stringify(it.oq)}`; s += `, sum:${JSON.stringify(it.sum||"")} },`; return s; }
function itemsArrayJS(){
  const arr = clean().map((it,i) => [it,i]).sort((a,b) => (LIDX[a[0].lane]-LIDX[b[0].lane]) || ((FIDX[targetFork(a[0])] ?? 99)-(FIDX[targetFork(b[0])] ?? 99)) || (a[1]-b[1])).map(x => x[0]);
  let out = "[\n", cur = null;
  for (const it of arr){ if (it.lane !== cur){ cur = it.lane; out += `\n    // ${it.lane} — ${LNAME[it.lane]||""}\n`; } out += "    " + serialize(it) + "\n"; }
  return out + "  ]";
}
const jsLit = x => JSON.stringify(x, null, 2).replace(/\n/g, "\n  ");
function buildDataFile(){
  return `/* roadmap-data.js — single source of truth for the Ethereum Protocol Privacy Roadmap.
 * Loaded by state-roadmap.html. Regenerate via the page's Edit mode → Download.
 */
(function () {
  const E = ${JSON.stringify(E)};
  const M = ${JSON.stringify(M)};

  const FORKS = ${jsLit(FORKS)};

  const LANES = ${jsLit(LANES)};

  const ITEMS = ${itemsArrayJS()};

  window.ROADMAP = { E, M, FORKS, LANES, ITEMS };
})();
`;
}
async function copyText(t, ok){ try { await navigator.clipboard.writeText(t); flash(ok); } catch { flash("copy failed — use Download"); } }
function downloadText(name, text){ const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([text], { type:"text/plain" })); a.download = name; a.click(); URL.revokeObjectURL(a.href); }

/* ---------- per-box hover card + open-questions editor ---------- */
const itemById = id => WORKING.find(i => i.id === id);
const hovercard = document.createElement("div"); hovercard.id = "hovercard"; hovercard.className = "hidden"; document.body.appendChild(hovercard);
function showCard(el){
  const it = itemById(el.getAttribute("data-itemid")); if (!it) return;
  const oq = Array.isArray(it.oq) ? it.oq.filter(Boolean) : [];
  if (!it.sum && !oq.length) return;
  const eip = isEip(it.id) ? `<span class="hc-eip">EIP-${esc(it.id)}</span>` : "";
  hovercard.innerHTML =
    `<div class="hc-title">${esc(it.title)} ${eip}</div>` +
    (it.sum ? `<div class="hc-sum">${esc(it.sum)}</div>` : "") +
    (oq.length ? `<div class="hc-oq"><div class="hc-oq-h">Open questions</div>${oq.map(q => `<div class="hc-q">${esc(q)}</div>`).join("")}</div>` : "");
  hovercard.classList.remove("hidden");
  const r = el.getBoundingClientRect(), cw = hovercard.offsetWidth, ch = hovercard.offsetHeight;
  let left = Math.min(r.left, window.innerWidth - cw - 12);
  let top = r.bottom + 8; if (top + ch > window.innerHeight - 12) top = r.top - ch - 8;
  hovercard.style.left = Math.max(12, left) + "px"; hovercard.style.top = Math.max(12, top) + "px";
}
function hideCard(){ hovercard.classList.add("hidden"); }
grid.addEventListener("pointerover", e => { const el = e.target.closest("[data-itemid]"); if (el) showCard(el); });
grid.addEventListener("pointerout", e => { const el = e.target.closest("[data-itemid]"); if (el && !el.contains(e.relatedTarget)) hideCard(); });

const modal = document.createElement("div"); modal.id = "detailsModal"; modal.className = "hidden"; document.body.appendChild(modal);
let editId = null;
const oqRow = q => `<div class="dm-qrow"><input class="dm-q" value="${esc(q)}" placeholder="open question…"><button class="dm-qx" data-act="delq" title="remove">✕</button></div>`;
function openDetails(id){
  const it = itemById(id); if (!it) return; editId = id; hideCard();
  const oq = Array.isArray(it.oq) ? it.oq : [];
  modal.innerHTML = `<div class="dm-box">
      <div class="dm-head"><b>${esc(it.title || it.id)}</b><button class="dm-x" data-act="close">✕</button></div>
      <label class="dm-l">Hover description</label>
      <textarea class="dm-sum" rows="3" placeholder="Shown when you hover this box">${esc(it.sum || "")}</textarea>
      <label class="dm-l">Open questions</label>
      <div class="dm-oq">${oq.map(oqRow).join("")}</div>
      <button class="dm-add" data-act="add">+ add question</button>
      <div class="dm-foot"><button class="dm-save" data-act="save">Save</button></div>
    </div>`;
  modal.classList.remove("hidden");
  const ta = modal.querySelector(".dm-sum"); if (ta) ta.focus();
}
modal.addEventListener("click", e => {
  const act = e.target.getAttribute("data-act");
  if (e.target === modal || act === "close"){ modal.classList.add("hidden"); editId = null; return; }
  if (act === "add"){ const c = modal.querySelector(".dm-oq"); c.insertAdjacentHTML("beforeend", oqRow("")); c.lastElementChild.querySelector("input").focus(); return; }
  if (act === "delq"){ e.target.closest(".dm-qrow").remove(); return; }
  if (act === "save"){
    const it = itemById(editId);
    if (it){
      it.sum = modal.querySelector(".dm-sum").value.trim();
      const qs = [...modal.querySelectorAll(".dm-q")].map(i => i.value.trim()).filter(Boolean);
      if (qs.length) it.oq = qs; else delete it.oq;
      save(); build(); flash("details saved ✓");
    }
    modal.classList.add("hidden"); editId = null;
  }
});
document.addEventListener("keydown", e => { if (e.key === "Escape" && !modal.classList.contains("hidden")){ modal.classList.add("hidden"); editId = null; } });
// open the editor from a tile's pencil or a "?" badge (works in both views; intercept before any link)
grid.addEventListener("click", e => { const t = e.target.closest("[data-edit]"); if (t){ e.preventDefault(); e.stopPropagation(); openDetails(t.getAttribute("data-edit")); } }, true);

applyViewChrome();
build();
updateNote();
</script>
</body>
